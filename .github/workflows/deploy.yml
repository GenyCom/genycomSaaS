name: Deploiement GenyCom SaaS

on:
  push:
    branches:
      - main # Le pipeline s'active uniquement quand vous pushez sur 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Récupération du code source
        uses: actions/checkout@v4

      - name: 2. Préparation de Node.js (Pour le Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Installation et Compilation de Vue.js
        run: |
          cd frontend
          npm install
          npm run build
          # Copie de l'interface finalisée dans le dossier public du backend
          cp -r dist/* ../backend/public/

      - name: 4. Préparation de PHP (Pour le Backend)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: 5. Installation des dépendances Laravel
        run: |
          cd backend
          composer update --no-dev --optimize-autoloader

      - name: 6. Envoi des fichiers vers Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: ./domains/genycom.com/genycom_core/backend/
          exclude: |
            **/.env
            **/storage/**